spring.application.name=liftarc-api

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT resource server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_JWT_ISSUER}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI}
spring.security.oauth2.resourceserver.jwt.audiences[0]=${SUPABASE_JWT_AUDIENCE}
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# Server
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG